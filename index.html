/* ═══════════════════════════════════════

    "Cups Keywords", "Swords Keywords", "Pentacles Keywords",
    "Court Card Keywords", "Building your Relationship", "Submit Completion Survey",
  ]},
  { num: 3, title: "Tarot Readings", steps: [
    "How to Perform a Reading", "One Card Pulls", "Reading Reflections",
    "Reading the Spreads", "Reading for Others", "Intuitive Reading",
    "Readings Demos", "Leave any Questions in Q&A", "Submit Completion Survey",
  ]},
  { num: 4, title: "Strengthen Intuition", steps: [

/* ═══════════════════════════════════════
   INITIAL STATE & HELPERS
   ═══════════════════════════════════════ */

function createInitialState() {
  return {
    intentions: {
      dream1: "", dream2: "", dream3: "",
      steps1: "", steps2: "", steps3: "",
      motivation: "", resources: "", celebration: "",
    },
    goals: [{ goal: "", why: "" }, { goal: "", why: "" }, { goal: "", why: "" }],
    weekly: {
      weekOf: "", priorities: "",
      sessionDate: "", sessionTheme: "", sessionPartner: "", sessionGoals: "",
      buddyDate: "", buddyGoals: "",
      todos: ["", "", "", "", "", ""],
      notes: "",
    },
    buddyMeetings: [{ date: "", buddy: "", priorities: "", cards: "", challenges: "", interpretation: "", insights: "" }],
    modules: MODULE_DATA.map(m => ({
      begun: "", finished: "", steps: new Array(m.steps.length).fill(false), notes: "",
    })),
    certification: {
      hptsModules: [false, false, false, false, false],
      readings: new Array(12).fill(false),
      applied: false,
    },
    dailyReadings: Array.from({ length: 7 }, () => ({
      date: "", powerQuestion: "", card1: "", card2: "", card3: "", card4: "", interpretation: "",
    })),
    qa: { questions: ["", "", "", ""], answers: ["", "", "", ""] },
    dates: {
      sessions: Array.from({ length: 6 }, () => ({ date: "", time: "" })),
      events: Array.from({ length: 3 }, () => ({ event: "", location: "", date: "", time: "", notes: "" })),
    },
    notes: "",
    savedLinks: [],
  };
}

function deepMerge(target, source) {
  if (!source) return target;
  const result = { ...target };
  for (const key in source) {
    if (Array.isArray(source[key]) && Array.isArray(target[key])) {
      result[key] = source[key].length >= target[key].length
        ? source[key] : [...source[key], ...target[key].slice(source[key].length)];
    } else if (typeof source[key] === "object" && source[key] !== null && typeof target[key] === "object") {
      result[key] = deepMerge(target[key], source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

function copyToClipboard(text) {
  try { navigator.clipboard.writeText(text); return true; }
  catch(e) {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta); return true;
  }
}

/* ═══════════════════════════════════════
   SHARED STYLES
   ═══════════════════════════════════════ */

const S = {
  card: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 2px 12px rgba(74,59,107,0.06)", border: "1px solid #E8DFF5" },
  label: { display: "block", fontSize: 12, fontWeight: 600, color: "#6B5B8D", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.8 },
  input: { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1.5px solid #D8CCE8", background: "#FAFAFE", fontSize: 14, color: "#2D1F3D", fontFamily: "inherit", transition: "border-color 0.2s, box-shadow 0.2s" },
  sectionTitle: { fontFamily: "'Cormorant Garamond', Georgia, serif", fontSize: 24, fontWeight: 600, color: "#4A3B6B", marginBottom: 16, letterSpacing: 0.5 },
  cardTitle: { fontFamily: "'Cormorant Garamond', Georgia, serif", fontSize: 16, fontWeight: 600, color: "#4A3B6B", marginBottom: 12 },
  intro: { fontSize: 14, color: "#6B5B8D", marginBottom: 14, lineHeight: 1.6 },
  tabBtn: { padding: "7px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, transition: "all 0.15s" },
  navItem: { display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 8, border: "none", cursor: "pointer", color: "rgba(255,255,255,0.85)", fontSize: 13, textAlign: "left", width: "100%", transition: "background 0.15s", background: "transparent" },
};

/* ═══════════════════════════════════════
   REUSABLE COMPONENTS
   ═══════════════════════════════════════ */

function Field({ label, value, onChange, multi, placeholder }) {
  const Tag = multi ? "textarea" : "input";
  return (
    <div style={{ marginBottom: 14 }}>
      {label && <label style={S.label}>{label}</label>}
      <Tag style={{ ...S.input, ...(multi ? { minHeight: 90, resize: "vertical" } : {}) }}
        value={value || ""} onChange={e => onChange(e.target.value)}
        placeholder={placeholder || ""} rows={multi ? 4 : undefined} />
    </div>
  );
}

function Check({ checked, onChange, label }) {
  return (
    <label style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", cursor: "pointer", fontSize: 14, color: "#2D1F3D", borderBottom: "1px solid #F0ECF5", userSelect: "none" }} onClick={() => onChange(!checked)}>
      <span style={{ width: 22, height: 22, borderRadius: 6, border: "2px solid", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s", background: checked ? "#6B5B8D" : "#F0ECF5", borderColor: checked ? "#6B5B8D" : "#C4B8D8" }}>
        {checked && <span style={{ color: "#fff", fontSize: 14, lineHeight: 1 }}>✓</span>}
      </span>
      <span style={{ textDecoration: checked ? "line-through" : "none", opacity: checked ? 0.6 : 1 }}>{label}</span>
    </label>
  );
}

function Card({ children, style: extra }) {
  return <div style={{ ...S.card, ...extra }}>{children}</div>;
}

function ProgressBar({ value, max, color }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div style={{ width: "100%", height: 8, background: "#F0ECF5", borderRadius: 4, overflow: "hidden", position: "relative" }}>
      <div style={{ height: "100%", borderRadius: 4, transition: "width 0.4s ease", width: `${pct}%`, background: color || "#6B5B8D" }} />
      <span style={{ position: "absolute", right: 0, top: -18, fontSize: 11, color: "#9B8BB5", fontWeight: 600 }}>{pct}%</span>
    </div>
  );
}

function CopyBtn({ getText, label }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => { copyToClipboard(getText()); setCopied(true); setTimeout(() => setCopied(false), 2000); };
  return (
    <button onClick={handleCopy} style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8,
      border: "1.5px solid #D8CCE8", background: copied ? "#5BC0BE" : "#F5F0FA",
      color: copied ? "#fff" : "#6B5B8D", fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",
    }}>
      {copied ? "✓ Copied!" : `📋 ${label || "Copy"}`}
    </button>
  );
}

/* ═══════════════════════════════════════
   SECTION COMPONENTS
   ═══════════════════════════════════════ */

          <div key={i} style={{ background: "#F0ECF5", borderRadius: 12, padding: "16px 10px", textAlign: "center" }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>{item.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#4A3B6B" }}>{item.text}</div>

      <p style={{ marginTop: 24, fontSize: 13, color: "#9B8BB5", fontStyle: "italic" }}>From Tarot Reader, Coach, and Guide — Sunny Sink</p>

}

  );
}

function GoalsSection({ data, update }) {

        <Card>
          <h3 style={S.cardTitle}>Study Buddy Meeting</h3>
          <Field label="Date of Meeting" value={data.buddyDate} onChange={v => update("buddyDate", v)} />
          <Field label="Goals for This Session" value={data.buddyGoals} onChange={v => update("buddyGoals", v)} multi />
          <h3 style={{ ...S.cardTitle, marginTop: 16 }}>To Do List</h3>
          {data.todos.map((t, i) => (
            <Field key={i} value={t} onChange={v => { const a = [...data.todos]; a[i] = v; update("todos", a); }} placeholder={`Task ${i + 1}`} />

      </div>
      <Card style={{ marginTop: 12 }}><Field label="Notes" value={data.notes} onChange={v => update("notes", v)} multi /></Card>

        <CopyBtn label="Export Weekly Plan" getText={() => {
          let t = `📅 WEEKLY PLAN — Week of ${data.weekOf || "(not set)"}\n\nPriorities: ${data.priorities || "(not set)"}\n\n`;

          return t;
        }} />
      </div>

function BuddySection({ data, addMeeting, updateMeeting }) {

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Cards Pulled" value={m.cards} onChange={v => updateMeeting(i, "cards", v)} multi />
            <Field label="Current Challenges" value={m.challenges} onChange={v => updateMeeting(i, "challenges", v)} multi />
          </div>

function RoadmapSection({ modules }) {
  const completedSteps = modules.reduce((sum, m) => sum + m.steps.filter(Boolean).length, 0);
  const totalSteps = modules.reduce((sum, m) => sum + m.steps.length, 0);
  return (
    <div>
      <h2 style={S.sectionTitle}>High Priestess Journey Roadmap</h2>
      <Card style={{ textAlign: "center", marginBottom: 20 }}>
        <h3 style={{ ...S.cardTitle, marginBottom: 8 }}>Overall Progress</h3>
        <ProgressBar value={completedSteps} max={totalSteps} color="linear-gradient(90deg, #5BC0BE, #6B5B8D)" />
        <p style={{ fontSize: 13, color: "#9B8BB5", margin: "8px 0 0" }}>{completedSteps} of {totalSteps} steps completed</p>
      </Card>
      <div style={{ display: "flex", flexDirection: "column", gap: 12, position: "relative" }}>
        <div style={{ position: "absolute", left: 24, top: 30, bottom: 30, width: 3, background: "linear-gradient(to bottom, #5BC0BE, #6B5B8D, #5BC0BE)", borderRadius: 2, zIndex: 0 }} />

          const done = modules[i].steps.filter(Boolean).length;
          const total = mod.steps.length;
          const complete = done === total;
          return (
            <div key={i} style={{ display: "flex", gap: 16, alignItems: "flex-start", position: "relative", zIndex: 1 }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", flexShrink: 0, background: complete ? "#5BC0BE" : done > 0 ? "#6B5B8D" : "#D8CCE8", display: "flex", alignItems: "center", justifyContent: "center", color: complete || done > 0 ? "#fff" : "#6B5B8D", fontWeight: 700, fontSize: 18, boxShadow: complete ? "0 0 16px rgba(91,192,190,0.5)" : "none", transition: "all 0.3s" }}>
                {complete ? "✓" : mod.num}
              </div>
              <Card style={{ flex: 1, margin: 0, opacity: complete ? 0.8 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <h3 style={{ ...S.cardTitle, margin: 0 }}>{mod.title}</h3>
                  <span style={{ fontSize: 12, color: "#9B8BB5" }}>{done}/{total}</span>
                </div>
                <ProgressBar value={done} max={total} color={complete ? "#5BC0BE" : "#6B5B8D"} />
              </Card>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function LessonsSection({ modules, updateModule }) {
  const [activeModule, setActiveModule] = useState(0);
  const mod = MODULE_DATA[activeModule];
  const modData = modules[activeModule];
  return (
    <div>
      <h2 style={S.sectionTitle}>Lesson Planners</h2>
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {MODULE_DATA.map((m, i) => {
          const done = modules[i].steps.filter(Boolean).length;
          return (
            <button key={i} onClick={() => setActiveModule(i)} style={{ ...S.tabBtn, background: i === activeModule ? "#6B5B8D" : "#F0ECF5", color: i === activeModule ? "#fff" : "#4A3B6B" }}>
              M{m.num} {done === m.steps.length ? "✓" : `${done}/${m.steps.length}`}
            </button>
          );
        })}
      </div>
      <Card>
        <h3 style={{ ...S.cardTitle, fontSize: 18 }}>Module {mod.num}: {mod.title}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
          <Field label="Date Begun" value={modData.begun} onChange={v => updateModule(activeModule, "begun", v)} placeholder="MM/DD/YYYY" />
          <Field label="Date Finished" value={modData.finished} onChange={v => updateModule(activeModule, "finished", v)} placeholder="MM/DD/YYYY" />
        </div>
        <h4 style={{ fontSize: 14, fontWeight: 700, color: "#4A3B6B", marginBottom: 10, letterSpacing: 1, textTransform: "uppercase" }}>Steps</h4>
        {mod.steps.map((step, si) => (
          <Check key={si} label={step} checked={modData.steps[si]} onChange={v => {

function HPTSPlanner() {
  const [data, setData] = useState(createInitialState());
  const [activeTab, setActiveTab] = useState("welcome");
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const saveTimeout = useRef(null);

  // Load from localStorage
  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) setData(deepMerge(createInitialState(), JSON.parse(saved)));
    } catch (e) { console.log("No saved data:", e); }
    setLoaded(true);
  }, []);

  // Auto-save with debounce
  useEffect(() => {
    if (!loaded) return;
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      setSaving(true);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) { console.error("Save failed:", e); }
      setTimeout(() => setSaving(false), 800);
    }, 600);
    return () => { if (saveTimeout.current) clearTimeout(saveTimeout.current); };
  }, [data, loaded]);

  // Updaters
  const updateIntentions = (key, val) => setData(d => ({ ...d, intentions: { ...d.intentions, [key]: val } }));
  const updateGoal = (i, key, val) => setData(d => { const g = [...d.goals]; g[i] = { ...g[i], [key]: val }; return { ...d, goals: g }; });
  const updateWeekly = (key, val) => setData(d => ({ ...d, weekly: { ...d.weekly, [key]: val } }));
  const addBuddyMeeting = () => setData(d => ({ ...d, buddyMeetings: [...d.buddyMeetings, { date: "", buddy: "", priorities: "", cards: "", challenges: "", interpretation: "", insights: "" }] }));
  const updateBuddyMeeting = (i, key, val) => setData(d => { const a = [...d.buddyMeetings]; a[i] = { ...a[i], [key]: val }; return { ...d, buddyMeetings: a }; });
  const updateModule = (i, key, val) => setData(d => { const m = [...d.modules]; m[i] = { ...m[i], [key]: val }; return { ...d, modules: m }; });
  const updateCert = (key, val) => setData(d => ({ ...d, certification: { ...d.certification, [key]: val } }));
  const updateDay = (i, key, val) => setData(d => { const a = [...d.dailyReadings]; a[i] = { ...a[i], [key]: val }; return { ...d, dailyReadings: a }; });
  const updateQA = (key, val) => setData(d => ({ ...d, qa: { ...d.qa, [key]: val } }));
  const updateDates = (key, val) => setData(d => ({ ...d, dates: { ...d.dates, [key]: val } }));

  const renderSection = () => {
    switch (activeTab) {
      case "welcome": return <WelcomeSection />;
      case "intentions": return <IntentionsSection data={data.intentions} update={updateIntentions} />;
      case "goals": return <GoalsSection data={data.goals} update={updateGoal} />;
      case "weekly": return <WeeklySection data={data.weekly} update={updateWeekly} />;
      case "buddy": return <BuddySection data={data.buddyMeetings} addMeeting={addBuddyMeeting} updateMeeting={updateBuddyMeeting} />;
      case "roadmap": return <RoadmapSection modules={data.modules} />;
      case "lessons": return <LessonsSection modules={data.modules} updateModule={updateModule} />;
      case "tmc": return <TMCSection />;
      case "certification": return <CertificationSection data={data.certification} updateCert={updateCert} />;
      case "daily": return <DailySection data={data.dailyReadings} updateDay={updateDay} />;
      case "qa": return <QASection data={data.qa} updateQA={updateQA} />;
      case "dates": return <DatesSection data={data.dates} updateDates={updateDates} />;
      case "notes": return <NotesSection value={data.notes} onChange={v => setData(d => ({ ...d, notes: v }))} links={data.savedLinks || []} onLinksChange={v => setData(d => ({ ...d, savedLinks: v }))} />;
      default: return <WelcomeSection />;
    }
  };

  if (!loaded) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#F5F0FA", fontFamily: "Georgia, serif", color: "#6B5B8D" }}>
      <div style={{ textAlign: "center" }}><div style={{ fontSize: 48, marginBottom: 12 }}>🔮</div><p>Loading your planner...</p></div>
    </div>
  );

  return (
    <div style={{ display: "flex", minHeight: "100vh", color: "#2D1F3D", background: "#F5F0FA" }}>
      <button className="menu-toggle" onClick={() => setMenuOpen(!menuOpen)} style={{ position: "fixed", top: 10, left: 10, zIndex: 200, background: "#6B5B8D", color: "#fff", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
        {menuOpen ? "✕" : "☰"} Menu
      </button>

      <nav className={`planner-sidebar${menuOpen ? " open" : ""}`} style={{ width: 220, background: "linear-gradient(180deg, #4A3B6B 0%, #6B5B8D 50%, #5B4B7A 100%)", display: "flex", flexDirection: "column", flexShrink: 0, position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ padding: "20px 16px 12px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid rgba(255,255,255,0.12)" }}>
          <div style={{ fontSize: 28 }}>🔮</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>HPTS Planner</div>
        </div>
        <div style={{ flex: 1, padding: "8px 8px", display: "flex", flexDirection: "column", gap: 2 }}>
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => { setActiveTab(tab.id); setMenuOpen(false); }} style={{ ...S.navItem, background: activeTab === tab.id ? "rgba(255,255,255,0.18)" : "transparent", fontWeight: activeTab === tab.id ? 700 : 400 }}>
              <span style={{ fontSize: 16, width: 24 }}>{tab.icon}</span><span>{tab.label}</span>
            </button>
          ))}
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.12)", margin: "6px 0", paddingTop: 6 }}>
            <a href="https://www.highpriestessts.com/feed" target="_blank" rel="noopener noreferrer" style={{ ...S.navItem, textDecoration: "none", color: "rgba(255,255,255,0.85)" }} onClick={() => setMenuOpen(false)}>
              <span style={{ fontSize: 16, width: 24 }}>🌐</span><span>Community</span>
            </a>
          </div>
        </div>
        <div style={{ padding: 16, borderTop: "1px solid rgba(255,255,255,0.12)" }}>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", textAlign: "center" }}>High Priestess Tarot School<br />Sunny Sink</div>
        </div>
      </nav>

      <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "10px 24px", display: "flex", justifyContent: "flex-end", borderBottom: "1px solid #E8DFF5", background: "#fff" }}>
          <span style={{ fontSize: 12, color: "#9B8BB5" }}>{saving ? "✨ Saving..." : "✓ Saved"}</span>
        </div>
        <div style={{ padding: 24, maxWidth: 800, width: "100%", margin: "0 auto" }}>
          {renderSection()}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HPTSPlanner />);
</script>
</body>
</html>
